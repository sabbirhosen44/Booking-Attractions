services:

  db:
    image: postgis/postgis:16-3.4

    container_name: booking-postgis

    environment:
      POSTGRES_DB: booking_attraction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile

    container_name: booking-django

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data: